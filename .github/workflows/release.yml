name: Build & Release

# Builds one-file binaries for Windows / macOS / Linux with PyInstaller.
# - Push a tag like v0.1.0  -> builds all three and attaches them to a GitHub Release.
# - Run manually (workflow_dispatch) -> builds all three and uploads them as artifacts.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write          # needed to create the Release and upload assets

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            asset: AdobeConnectDownloader-windows-x64.exe
            built: dist/AdobeConnectDownloader.exe
          - os: macos-latest
            label: macos-arm64
            asset: AdobeConnectDownloader-macos-arm64
            built: dist/AdobeConnectDownloader
          - os: ubuntu-latest
            label: linux-x64
            asset: AdobeConnectDownloader-linux-x64
            built: dist/AdobeConnectDownloader
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install app + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install . "pyinstaller>=6"

      - name: Build one-file binary
        run: pyinstaller --clean --noconfirm packaging/AdobeConnectDownloader.spec

      - name: Rename for this platform
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.built }}" "out/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
          fail_on_unmatched_files: true
